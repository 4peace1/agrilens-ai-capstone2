# Non-sensitive configuration shared by gateway + worker + inference pods.
# Per the brief: "Use environment variables for all configuration to
# ensure portability between dev and prod." This file is the prod
# equivalent of the .env used locally with docker-compose.
apiVersion: v1
kind: ConfigMap
metadata:
  name: agrilens-config
data:
  AGRILENS_ENVIRONMENT: "production"
  AGRILENS_GCP_PROJECT_ID: "agrilens-prod"
  AGRILENS_PUBSUB_TOPIC_IMAGE_PROCESSING: "image-processing-topic"
  AGRILENS_PUBSUB_SUBSCRIPTION_IMAGE_PROCESSING: "image-processing-sub"
  AGRILENS_GCS_BUCKET_RAW: "agrilens-raw-images-prod"
  AGRILENS_GCS_BUCKET_PROCESSED: "agrilens-processed-images-prod"
  AGRILENS_INFERENCE_SERVICE_URL: "http://inference-orchestrator:8080"
  AGRILENS_INFERENCE_TIMEOUT_SECONDS: "2.0"
  AGRILENS_MODEL_INPUT_SIZE: "224"
  AGRILENS_GEO_MASK_PRECISION_DEGREES: "0.01"
  AGRILENS_GEO_JITTER_METERS: "250.0"
---
# Secrets are templated here for documentation purposes only — in
# practice these are populated via a secret manager (e.g. Google Secret
# Manager + External Secrets Operator), never committed with real values.
apiVersion: v1
kind: Secret
metadata:
  name: agrilens-secrets
type: Opaque
stringData:
  AGRILENS_DATABASE_URL: "postgresql://agrilens:CHANGE_ME@10.0.0.5:5432/agrilens"
  AGRILENS_FCM_SERVER_KEY: "CHANGE_ME"
