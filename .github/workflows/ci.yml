name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest -v --maxfail=1

  validate-k8s-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate YAML syntax
        run: |
          pip install pyyaml
          python -c "
          import yaml, glob, sys
          files = glob.glob('k8s/*.yaml') + ['docker-compose.yml']
          for f in files:
              try:
                  list(yaml.safe_load_all(open(f)))
                  print(f'{f}: OK')
              except Exception as e:
                  print(f'{f}: FAILED - {e}')
                  sys.exit(1)
          "

  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { name: gateway, dockerfile: Dockerfile, context: . }
          - { name: worker, dockerfile: worker/Dockerfile, context: . }
          - { name: inference, dockerfile: inference/model_server/Dockerfile, context: . }
          - { name: notification, dockerfile: notification/Dockerfile, context: . }
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.target.name }} image
        run: |
          docker build -f ${{ matrix.target.dockerfile }} -t agrilens-${{ matrix.target.name }}:ci ${{ matrix.target.context }}
